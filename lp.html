<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP制作実績 | Kairos Web Production</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0f0f0f;
  --dark: #1a1a1a;
  --gray-dark: #444;
  --gray: #888;
  --gray-light: #bbb;
  --border: #e8e8e8;
  --bg: #fafafa;
  --white: #ffffff;
  --accent: #c4714a;
  --accent-light: #f0e8e3;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Noto Sans JP', sans-serif; font-weight: 300; background: var(--white); color: var(--black); overflow-x: hidden; }

header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  height: 60px; display: flex; align-items: center;
  padding: 0 48px; justify-content: space-between;
}
.header-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.06em; color: var(--black); text-decoration: none; }
.header-logo span { color: var(--accent); }
nav { display: flex; gap: 32px; align-items: center; }
nav a { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray); text-decoration: none; transition: color 0.2s; }
nav a:hover, nav a.active { color: var(--black); }
.nav-contact { border: 1px solid var(--black); padding: 7px 18px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--black) !important; transition: all 0.2s !important; }
.nav-contact:hover { background: var(--black); color: var(--white) !important; }
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
.hamburger span { width: 20px; height: 1px; background: var(--black); display: block; }

/* PAGE HERO */
.page-hero {
  padding: 120px 48px 64px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.breadcrumb { font-size: 11px; letter-spacing: 0.12em; color: var(--gray); margin-bottom: 20px; }
.breadcrumb a { color: var(--gray); text-decoration: none; }
.breadcrumb a:hover { color: var(--black); }
.page-eyebrow { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.page-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
.page-title { font-family: 'Playfair Display', serif; font-size: clamp(36px, 5vw, 60px); font-weight: 400; line-height: 1.2; margin-bottom: 20px; }
.page-title em { font-style: italic; color: var(--accent); }
.page-desc { font-size: 13px; line-height: 2.2; color: var(--gray-dark); max-width: 560px; }

/* FILTER */
.filter-bar {
  padding: 28px 48px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.filter-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray); margin-right: 8px; }
.filter-btn {
  background: none; border: 1px solid var(--border);
  padding: 6px 16px; font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; cursor: pointer; color: var(--gray);
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { background: var(--black); border-color: var(--black); color: var(--white); }

/* WORKS GRID */
.works-section { padding: 64px 48px 96px; }
.works-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px; background: var(--border);
}
.work-card {
  background: var(--white);
  text-decoration: none; color: inherit;
  display: block; position: relative;
  overflow: hidden;
  transition: transform 0.3s ease;
}
.work-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
.work-card:hover .work-thumb img { transform: scale(1.04); }
.work-card:hover .work-overlay { opacity: 1; }
.work-thumb {
  aspect-ratio: 16/10;
  overflow: hidden;
  background: var(--bg);
  position: relative;
}
.work-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.6s ease; }
.work-overlay {
  position: absolute; inset: 0;
  background: rgba(15,15,15,0.5);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s;
}
.work-overlay span {
  border: 1px solid white; color: white;
  padding: 10px 24px; font-size: 10px;
  letter-spacing: 0.16em; text-transform: uppercase;
}
.work-info { padding: 22px 24px 28px; }
.work-tag { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.work-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 400; margin-bottom: 8px; line-height: 1.4; }
.work-desc { font-size: 11px; line-height: 1.9; color: var(--gray-dark); }

/* FOOTER */
footer { background: var(--black); color: var(--white); padding: 48px; }
.footer-bottom { display: flex; justify-content: space-between; align-items: center; }
.footer-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.06em; }
.footer-logo span { color: var(--accent); }
.footer-copy { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.06em; }
.footer-nav { display: flex; gap: 24px; }
.footer-nav a { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s; }
.footer-nav a:hover { color: var(--white); }

.mobile-menu { position: fixed; inset: 0; background: var(--white); z-index: 150; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 36px; transform: translateX(100%); transition: transform 0.35s ease; }
.mobile-menu.open { transform: translateX(0); }
.mobile-menu a { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; color: var(--black); text-decoration: none; }
.mobile-close { position: absolute; top: 18px; right: 24px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--gray); }

@media (max-width: 960px) {
  header { padding: 0 24px; }
  nav { display: none; }
  .hamburger { display: flex; }
  .page-hero { padding: 100px 24px 48px; }
  .filter-bar { padding: 20px 24px; }
  .works-section { padding: 40px 24px 72px; }
  .works-grid { grid-template-columns: repeat(2, 1fr); }
  footer { padding: 40px 24px; }
}
@media (max-width: 600px) {
  .works-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="header-logo">Kairos <span>Web Production</span></a>
  <nav>
    <a href="lp.html" class="active">LP制作</a>
    <a href="corporate.html">コーポレート</a>
    <a href="ec.html">EC・実装</a>
    <a href="system.html">システム開発</a>
    <a href="index.html#contact" class="nav-contact">Contact</a>
  </nav>
  <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</header>

<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" onclick="toggleMenu()">✕</button>
  <a href="index.html" onclick="toggleMenu()">Home</a>
  <a href="lp.html" onclick="toggleMenu()">LP制作</a>
  <a href="corporate.html" onclick="toggleMenu()">コーポレート</a>
  <a href="ec.html" onclick="toggleMenu()">EC・実装</a>
  <a href="system.html" onclick="toggleMenu()">システム開発</a>
</div>

<div class="page-hero">
  <p class="breadcrumb"><a href="index.html">Home</a> / LP制作</p>
  <p class="page-eyebrow">Landing Page</p>
  <h1 class="page-title">LP<em>制作</em>実績</h1>
  <p class="page-desc">採用・集客・ブランディングを目的としたランディングページ制作実績です。業種に合わせたデザインと、成果につながる導線設計を意識して制作しています。</p>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="filterWork('all', this)">All</button>
  <button class="filter-btn" onclick="filterWork('採用', this)">採用LP</button>
  <button class="filter-btn" onclick="filterWork('集客', this)">集客LP</button>
  <button class="filter-btn" onclick="filterWork('サービス', this)">サービス</button>
</div>

<section class="works-section">
  <div class="works-grid" id="worksGrid"></div>
</section>

<footer>
  <div class="footer-bottom">
    <div class="footer-logo">Kairos <span>Web Production</span></div>
    <nav class="footer-nav">
      <a href="lp.html">LP制作</a>
      <a href="corporate.html">コーポレート</a>
      <a href="ec.html">EC・実装</a>
      <a href="system.html">システム開発</a>
    </nav>
    <span class="footer-copy">© 2025 Kairos Web Production.</span>
  </div>
</footer>

<script>
const works = [
  { tag: '採用', title: 'ドライバー採用LP', desc: '物流会社のドライバー採用を目的としたLP。社員インタビュー・1日の流れ・募集要項など応募導線を意識した構成。', url: 'https://kairos-epsilon.github.io/recruit-driver-lp/', img: 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?w=800&q=80&auto=format&fit=crop' },
  { tag: '集客', title: 'Logistics Company LP', desc: '物流・運送会社向けコーポレートLP。信頼感と実績を前面に打ち出した構成。', url: 'https://kairos-epsilon.github.io/logistics-lp/', img: 'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=800&q=80&auto=format&fit=crop' },
  { tag: '集客', title: 'Café Landing Page', desc: 'ナチュラルテイストのカフェ向けLP。スムーズスクロールアニメーションで世界観を演出。', url: 'https://kairos-epsilon.github.io/cafe-lp/', img: 'https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=800&q=80&auto=format&fit=crop' },
  { tag: '集客', title: 'Beauty Salon LP', desc: 'エレガントな美容サロン向けLP。高級感のあるデザインでブランドイメージを訴求。', url: 'https://kairos-epsilon.github.io/beauty-lp/', img: 'https://images.unsplash.com/photo-1560066984-138dadb4c035?w=800&q=80&auto=format&fit=crop' },
  { tag: '集客', title: 'Fitness Gym LP', desc: 'パーソナルジム向けLP。ダークネイビーを基調とした高級感のあるモダンデザイン。', url: 'https://kairos-epsilon.github.io/fitness-lp/', img: 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800&q=80&auto=format&fit=crop' },
  { tag: '集客', title: '不動産売却LP', desc: '不動産売却サービス向けLP。安心感と実績を訴求する構成で問い合わせ導線を設計。', url: 'https://kairos-epsilon.github.io/real-estate-sale-lp/', img: 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=800&q=80&auto=format&fit=crop' },
  { tag: 'サービス', title: 'リフォームLP', desc: 'リフォーム会社向けLP。施工事例・ビフォーアフターを活かした説得力のある構成。', url: 'https://kairos-epsilon.github.io/reform-lp/', img: 'https://images.unsplash.com/photo-1581578731548-c64695cc6952?w=800&q=80&auto=format&fit=crop' },
  { tag: 'サービス', title: 'ブランド買取LP', desc: 'ブランド買取サービス向けLP。即日査定・高価買取を前面に出した訴求構成。', url: 'https://kairos-epsilon.github.io/brand-purchase-lp/', img: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=800&q=80&auto=format&fit=crop' },
  { tag: 'サービス', title: '骨董品買取LP', desc: '骨董品・古美術品の買取サービス向けLP。品格と信頼感を重視したデザイン。', url: 'https://kairos-epsilon.github.io/lp-kottohin/', img: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80&auto=format&fit=crop' },
  { tag: 'サービス', title: '結婚相談所LP', desc: '結婚相談所向け集客LP。温かみのあるデザインで入会動機を高める導線設計。', url: 'https://kairos-epsilon.github.io/lp-encourage/', img: 'https://images.unsplash.com/photo-1519741497674-611481863552?w=800&q=80&auto=format&fit=crop' },
  { tag: 'サービス', title: '税理士事務所LP', desc: '税理士向けサービスLP。専門性と信頼感を訴求するクリーンなデザイン。', url: 'https://kairos-epsilon.github.io/tax-accountant-lp/', img: 'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=800&q=80&auto=format&fit=crop' },
  { tag: 'サービス', title: '保険コンサルLP', desc: '保険コンサルタント向けLP。安心感と相談しやすさを演出する構成。', url: 'https://kairos-epsilon.github.io/insurance-consulting-lp/', img: 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=800&q=80&auto=format&fit=crop' },
  { tag: 'サービス', title: 'プライベートツアーLP', desc: '旅行・プライベートツアー向けLP。非日常感を演出するビジュアル重視の構成。', url: 'https://kairos-epsilon.github.io/private-tour-lp/', img: 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800&q=80&auto=format&fit=crop' },
  { tag: '集客', title: '建築・設計事務所LP', desc: '建築・設計事務所向けLP。施工実績を大きく見せるビジュアル重視の構成。', url: 'https://kairos-epsilon.github.io/architecture-lp-demo/', img: 'https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=800&q=80&auto=format&fit=crop' },
  { tag: 'サービス', title: '動画配信サービスLP', desc: '動画配信プラットフォーム向けLP。鮮やかなビジュアルで登録を促す構成。', url: 'https://kairos-epsilon.github.io/tver-lp/', img: 'https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37?w=800&q=80&auto=format&fit=crop' },
  { tag: '集客', title: '箱根温泉旅館LP', desc: '温泉旅館の予約促進LP。和の情緒と高級感を融合させたデザイン。', url: 'https://kairos-epsilon.github.io/hakone-onsen-lp-proposal/', img: 'https://images.unsplash.com/photo-1545569341-9eb8b30979d9?w=800&q=80&auto=format&fit=crop' },
];

let currentFilter = 'all';

function renderWorks(filter) {
  const grid = document.getElementById('worksGrid');
  const filtered = filter === 'all' ? works : works.filter(w => w.tag === filter);
  grid.innerHTML = filtered.map(w => `
    <a href="${w.url}" target="_blank" rel="noopener" class="work-card">
      <div class="work-thumb">
        <img src="${w.img}" alt="${w.title}" loading="lazy">
        <div class="work-overlay"><span>View Site →</span></div>
      </div>
      <div class="work-info">
        <p class="work-tag">${w.tag}</p>
        <h3 class="work-title">${w.title}</h3>
        <p class="work-desc">${w.desc}</p>
      </div>
    </a>`).join('');
}

function filterWork(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWorks(tag);
}

function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}

renderWorks('all');
</script>
</body>
</html>
